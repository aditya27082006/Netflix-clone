<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix india - Watch Shows Online, Watch Movies Online </title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/images/netflix-favicon.png">
</head>
<body>
    <!-- PROMOTIONAL BAR -->
    <div class="promo-bar">
        <div class="promo-content">
            <!-- Here we have used svg to create the gift icon( SVG- scalable vector graphics) -->
            <svg class="gift-icon">
                 <!-- viewbox - Imagine that the icon is drawn inside a 24 × 24  coordinate system -->
                viewBox="0 0 24 24"
                fill="none"
                 <!-- This tells the browser that the code  follows the SVG standard -->
                xmlns="http://www.w3.org/2000/svg">

                <path d="M20 12V22H4V12"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"/>

                <path d="M2 7H22V12H2V7Z"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"/>

                <path d="M12 7V22"
                      stroke="currentColor"
                      stroke-width="1.5"/>

                <path d="M12 7H8.5C6.57 7 5 5.43 5 3.5
                         C5 2.12 6.12 1 7.5 1
                         C10 1 12 7 12 7Z"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linejoin="round"/>

                <path d="M12 7H15.5C17.43 7 19 5.43 19 3.5
                         C19 2.12 17.88 1 16.5 1
                         C14 1 12 7 12 7Z"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linejoin="round"/>
            </svg>
            <span>New to Netflix? Try 14 days for ₹0.</span>
        </div>
    </div>
    <!-- OTHER SECTION EXCEPT PROMOTIONAL BAR  -->
    <div class="main">
        <nav>
            <span><img width="83" src="assets/images/logo.svg" alt="Netflix logo"></span>
            <div>
                <div class="language-box">
                    <span class="language-icon">文A</span>

                    <select>
                        <option>English</option>
                        <option>हिन्दी</option>
                    </select>
                </div>

                <button>Sign In</button>
            </div>
        </nav>
        <div class="box"></div>
        <div class="hero">
            <span>
                Unlimited movies,
            </span>
            <span>
                shows, and more
            </span>
            <span>
                Plans start at ₹149. Cancel anytime.
            </span>
            <span>
                Ready to watch? Enter your email to start your membership.
            </span>
            <div>
                <input type="email" placeholder="Email address">
                <button>
                    Try 14 Days for ₹0
                    <span class="arrow"></span>
                </button>
            </div>
            <span>New members only. Terms below.</span>
        </div>
    </div>
<!-- NOW another parts the red/pink curvature how to make it its html codes -->

    <div class="curve-container">
        <div class="curve"></div>
    </div>
    
</body>
</html>
